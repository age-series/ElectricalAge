name: Tests

on:
  push:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 8
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
      - name: Set up Gradle JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run tests
        run: ./gradlew -Dorg.gradle.java.installations.auto-download=false test

  benchmark-test:
    runs-on: ubuntu-latest
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 8
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
      - name: Set up Gradle JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run benchmark tests
        run: |
          set -o pipefail
          mkdir -p build/benchmark-artifacts
          ./gradlew -Dorg.gradle.java.installations.auto-download=false benchmarkTest 2>&1 | tee build/benchmark-artifacts/benchmark-gradle.log
      - name: Extract benchmark statistics
        if: always()
        run: python3 script/extract_benchmark_stats.py
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          if-no-files-found: warn
          path: |
            build/benchmark-artifacts/**
            build/test-results/benchmarkTest/**
            build/reports/tests/benchmarkTest/**
            build/reports/problems/**
            ${{ runner.temp }}/.gradle-actions/build-results/*.json
